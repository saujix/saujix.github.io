
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saujix</title>
    <link rel="stylesheet" href="styles.css">
   
    <!--pixelify-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Protest+Strike&display=swap" rel="stylesheet">
    <!---->
</head>

<body>
    <div class="bgImg">
        <img class="generalImg i1" src="landingPageImages/blog.jpg">
        <img class="generalImg i2" src="landingPageImages/professional.jpg">
        <img class="generalImg i3" src="landingPageImages/picture.jpg">
        <img class="generalImg i4" src="landingPageImages/landingBG.jpg">
    </div>
    <div class="container">     
        <div class="box" >
            <div class="containerHeader" onmouseenter="completeName()" onmouseleave="restoreName()">
                <h1 id="name">Akshat P.</h1>
            </div>
            <div class="boxBody">
                <div><h3>Where would you like to go?</h3></div>
                <div>
                    <ul class="list" >
                        <div id="pictures" onmouseenter="changeBg()" onmouseleave="restoreBg()">
                            <a href="pages/blog/index.html">
                                Pictures
                            </a>
                        </div>
                        <div id="professional" onmouseenter="changeBg()" onmouseleave="restoreBg()">
                            <a href="pages/professional/index.html">
                                Professional
                            </a>
                        </div>
                        <div id="blog" onmouseenter="changeBg()" onmouseleave="restoreBg()">
                            <a href="pages/blog/index.html">
                                Blog
                            </a>
                        </div>
                    </ul>
                </div> 
            </div>
        </div>  
    </div>
    <script src="app.js"></script>
</body>
</html>
